# PostgreSQL. Versions 9.3 and up are supported.
#
# Install the pg driver:
#   gem install pg
# On macOS with Homebrew:
#   gem install pg -- --with-pg-config=/usr/local/bin/pg_config
# On Windows:
#   gem install pg
#       Choose the win32 build.
#       Install PostgreSQL and put its /bin directory on your path.
#
# Configure Using Gemfile
# gem "pg"
#
default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("PGHOST", "127.0.0.1") %>
  port: <%= ENV.fetch("PGPORT", 5432) %>
  username: <%= ENV.fetch("PGUSER", ENV.fetch("USER", "postgres")) %>
  password: <%= ENV["PGPASSWORD"] %>

development:
  <<: *default
  database: pixelup_development

test:
  <<: *default
  database: pixelup_test

production:
  primary: &primary_production
    <<: *default
    database: pixelup_production
    username: <%= ENV.fetch("PGUSER", "pixelup") %>
    password: <%= ENV["PIXELUP_DATABASE_PASSWORD"] %>
  cache:
    <<: *primary_production
    database: pixelup_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: pixelup_production_queue
    migrations_paths: db/queue_migrate
